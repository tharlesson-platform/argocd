apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-kyverno-policies
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-8"
spec:
  project: platform
  source:
    repoURL: https://github.com/your-org/argocd-gitops.git
    targetRevision: main
    path: platform/policies/kyverno/overlays/shared
  destination:
    server: https://kubernetes.default.svc
    namespace: kyverno
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - ApplyOutOfSyncOnly=true
