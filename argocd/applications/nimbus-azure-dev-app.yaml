apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nimbus-azure-dev
  namespace: argocd
spec:
  project: nimbus-azure
  source:
    repoURL: https://github.com/your-org/argocd-gitops.git
    targetRevision: main
    path: apps/nimbus-platform/overlays/azure-dev
  destination:
    server: https://kubernetes.default.svc
    namespace: nimbus-azure-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
