apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: nimbus-platform
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: platform-secrets
  target:
    name: nimbus-platform-runtime
    creationPolicy: Owner
  data:
    - secretKey: NIMBUS_DATABASE_URL
      remoteRef:
        key: nimbus/shared/runtime
        property: database_url
    - secretKey: NIMBUS_TOKEN_SECRET
      remoteRef:
        key: nimbus/shared/runtime
        property: token_secret
