apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - configmap.yaml
  - serviceaccount.yaml
  - rollout.yaml
  - service-stable.yaml
  - service-canary.yaml
  - ingress.yaml
  - externalsecret.yaml
  - poddisruptionbudget.yaml
  - hpa.yaml
  - servicemonitor.yaml
commonLabels:
  app.kubernetes.io/name: nimbus-platform
  app.kubernetes.io/part-of: nimbus-cloud
  team: platform
images:
  - name: nimbus-cloud-backend
    newName: nimbus-cloud-backend
    newTag: "0.1.0"
