apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: nimbus-aws-dev
resources:
  - ../../base
images:
  - name: nimbus-cloud-backend
    newName: <aws-account-id>.dkr.ecr.<region>.amazonaws.com/nimbus-cloud-backend
    newTag: "aws-dev-initial"
patchesStrategicMerge:
  - patch-configmap.yaml
  - patch-ingress.yaml
  - patch-rollout.yaml
  - patch-externalsecret.yaml
  - patch-hpa.yaml
